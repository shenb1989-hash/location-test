<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Weather Now</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
padding:30px;
border-radius:16px;
text-align:center;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

button{
margin-top:15px;
padding:12px 18px;
border:none;
border-radius:10px;
background:white;
color:#333;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#eee;
}

#status{
margin-top:15px;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h2>☀ Weather Now</h2>

<p>取得你的所在地天氣</p>

<button onclick="getLocation()">取得我的位置</button>

<p id="status"></p>

</div>

<script>

function getLocation(){

document.getElementById("status").innerHTML="正在取得位置...";

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(showPosition,showError);

}else{

document.getElementById("status").innerHTML="瀏覽器不支援定位";

}

}

function showPosition(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

document.getElementById("status").innerHTML=

"📍 位置已取得<br>"+
"緯度: "+lat+"<br>"+
"經度: "+lon+"<br><br>"+
"<a style='color:white' target='_blank' href='https://www.google.com/maps?q="+lat+","+lon+"'>查看地圖</a>";

}

function showError(){

document.getElementById("status").innerHTML="需要允許定位才能查看當地天氣";

}

</script>

</body>

</html>
